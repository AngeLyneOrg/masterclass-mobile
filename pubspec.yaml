name: masterclass
description: "Application d'E-Formation propulsée par MasterClass, un système de tutorat intelligent IA."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.4

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  # UI Essentials & Design System
  cupertino_icons: ^1.0.9            # Default icons for iOS-styled widgets.
  icons_plus: ^5.0.0                 # Massive collection of popular icon packs (FontAwesome, Material, etc.).
  flutter_slidable: ^4.0.3           # Slidable list items with left/right swipe actions.
  slider_button: ^3.1.0              # A customizable slider button for confirmation actions (e.g., "slide to unlock").
  oktoast: ^3.4.0                    # Pure Dart/Flutter toast notification library, highly customizable.

  # Data Visualization
  fl_chart: ^1.2.0                   # Powerful chart library for drawing line, bar, pie, and scatter charts.

  # Navigation
  go_router: ^17.3.0                 # Declarative routing package using the MaterialApp.router constructor.

  # State Management
  flutter_riverpod: ^3.3.2           # Reactive caching and state management framework.
  equatable: ^2.0.8                  # Simplifies value-based object comparisons without overriding '==' and hashCode.

  # Local Storage & File System
  shared_preferences: ^2.5.5         # Persistent storage for simple key-value pairs (NSUserDefaults/SharedPreferences).
  flutter_secure_storage: ^10.3.1    # Encrypted local storage for sensitive data like tokens or passwords.
  path_provider: ^2.1.5              # Finds commonly used locations on the filesystem (temp, documents, etc.).

  # Networking & Image Caching
  http: ^1.6.0                       # Composable, multi-platform library for making basic HTTP requests.
  dio: ^5.9.2                        # Advanced HTTP client with interceptors, global configuration, and file downloading.
  cached_network_image: ^3.4.1       # Displays images from the web and caches them in the local temporary directory.
  flutter_cache_manager: ^3.4.1      # Generic cache manager used behind the scenes to store network files locally.

  # Firebase Suite & Authentication
  firebase_core: ^4.10.0             # Required plugin to initialize any Firebase service in a Flutter app.
  firebase_auth: ^6.5.2              # Enables user authentication using passwords, phone numbers, and identity providers.
  google_sign_in: ^7.2.0             # Google Sign-In integration wrapper, commonly paired with FirebaseAuth.
  pinput: ^6.0.2                     # Highly customizable OTP (One-Time Password) / PIN code input field.

  # Cloud Database
  cloud_firestore: ^6.5.0            # Cloud Firestore API, a flexible, scalable NoSQL cloud database.

  # Utilities & Cryptography
  uuid: ^4.5.3                       # Generates unique identifiers (UUIDv1, UUIDv4, UUIDv5).
  crypto: ^3.0.7                     # Cryptographic hashing functions (MD5, SHA-1, SHA-256, etc.).
  mailer: ^7.1.0                     # Dispatches emails from Dart/Flutter using SMTP servers.

  # Development & App Configuration
  flutter_launcher_icons: ^0.14.4    # Command-line tool to automatically generate and update app launcher icons.
  flutter_native_splash: ^2.4.7      # Generates and configures native splash screens for Android and iOS.


flutter_launcher_icons:
  image_path: "assets/icons/masterclass_icon_white.png"
  adaptive_icon_background: "#003BFF"
#  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/masterclass_icon_white.png"
  adaptive_icon_monochrome: "assets/icons/masterclass_icon_monochrome.png"

  android: true

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

flutter_native_splash:
  color: "#003BFF"               # Couleur de fond générale (Android 11 et moins, iOS)
  image: "assets/icons/masterclass_wordmark_noback.png" # Image centrale
  android: true
  ios: true
  fullscreen: true               # Recommandé pour éviter les sauts de barres système au démarrage

  # AJOUT : Configuration impérative pour Android 12 jusqu'à Android 16+
  android_12:
    color: "#003BFF"             # Doit correspondre à votre couleur principale arrière-plan
    image: "assets/icons/masterclass_wordmark_noback.png"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/fonts/
    - assets/icons/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
